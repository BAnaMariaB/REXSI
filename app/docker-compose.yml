services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys
      POSTGRES_DB: kindle
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"    # exposed so scripts/populate_db.py can load data from the host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recsys -d kindle"]
      interval: 5s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://recsys:recsys@postgres:5432/kindle
      ARTIFACTS_DIR: /artifacts
    volumes:
      - ./artifacts:/artifacts:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  pgdata:
